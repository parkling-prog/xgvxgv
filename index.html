<style>
:root{
  --warm:#FFF7EE;--warm-2:#FFE8D2;--ink:#2B2A28;--muted:#6B655E;
  --teal:#0F8A8A;--teal-2:#0B6E6E;--accent:#E76F51;--line:#06C755;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--warm);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:0 20px}

/* HERO */
.hero{padding:32px 0 40px;background:linear-gradient(180deg,var(--warm-2) 0%,var(--warm) 100%);text-align:center}
.badge{display:inline-block;background:var(--accent);color:#fff;font-weight:700;padding:6px 14px;border-radius:999px;font-size:13px;margin-bottom:18px;letter-spacing:.5px}
.hero h1{font-size:30px;line-height:1.3;font-weight:900;margin-bottom:16px;letter-spacing:-.5px}
.hero h1 span{color:var(--teal)}
.hero p.lead{font-size:16px;color:var(--muted);margin-bottom:26px;text-align:left}
.hero-img{border-radius:22px;overflow:hidden;box-shadow:0 18px 40px -15px rgba(0,0,0,.25);aspect-ratio:3/4;margin-bottom:28px}
.hero-img img{width:100%;height:100%;object-fit:cover;display:block}

/* BUTTON — mobile full width */
.btn-line{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--line);color:#fff;font-weight:800;font-size:18px;padding:18px 24px;border-radius:999px;text-decoration:none;box-shadow:0 12px 28px -10px rgba(6,199,85,.55);width:100%;max-width:360px;margin:0 auto;transition:transform .15s}
.btn-line:active{transform:scale(.97)}
.btn-line svg{width:24px;height:24px;fill:#fff;flex-shrink:0}

footer{background:#1a1918;color:#a8a39c;text-align:center;padding:26px 20px;font-size:12px;margin-top:0}
footer p+p{margin-top:6px}

/* Tablet / Desktop upscale */
@media (min-width: 720px){
  .wrap{max-width:560px;padding:0 24px}
  .hero{padding:60px 0 56px}
  .hero h1{font-size:38px}
  .hero p.lead{font-size:17px;text-align:center}
  .hero-img{aspect-ratio:3/4;max-width:420px;margin-left:auto;margin-right:auto;margin-bottom:32px}
}
</style>
